<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kamera Lokasi</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#000000">

<style>
body {
  margin: 0;
  font-family: Arial;
  background: black;
  color: white;
  text-align: center;
}

video, canvas {
  width: 100%;
  max-width: 400px;
  border-radius: 12px;
  margin-top: 10px;
}

/* CONTROL BAR */
#controlBar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin: 15px;
}

/* SHUTTER */
#shutter {
  width: 80px;
  height: 80px;
  border-radius: 50%;
  background: white;
  border: 6px solid #ccc;
}

button {
  padding: 10px;
  border-radius: 8px;
  border: none;
  background: orange;
  color: white;
  font-weight: bold;
}

#preview {
  display: none;
}
</style>
</head>

<body>

<h3>Kamera Lokasi</h3>

<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>

<!-- CONTROL -->
<div id="controlBar">
  <button onclick="startCamera()">Aktifkan</button>

  <div id="shutter" onclick="takePhoto()"></div>

  <button onclick="switchCamera()">Ganti</button>
</div>

<div id="preview">
  <button onclick="shareTelegram()">Share Telegram</button>
  <button onclick="resetCamera()">Reset</button>
</div>

<script>
let video = document.getElementById("video");
let canvas = document.getElementById("canvas");
let ctx = canvas.getContext("2d");

let currentFacing = "environment";
let stream;
let alamatLengkap = "";

// START CAMERA
async function startCamera() {
  if (stream) stream.getTracks().forEach(t => t.stop());

  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: currentFacing }
    });
    video.srcObject = stream;

    // MIRROR kalau kamera depan
    if (currentFacing === "user") {
      video.style.transform = "scaleX(-1)";
    } else {
      video.style.transform = "scaleX(1)";
    }

  } catch {
    alert("Izin kamera ditolak");
  }

  ambilLokasi();
}

// SWITCH CAMERA
function switchCamera() {
  currentFacing = currentFacing === "environment" ? "user" : "environment";
  startCamera();
}

// AMBIL LOKASI
async function ambilLokasi() {
  navigator.geolocation.getCurrentPosition(async pos => {
    let lat = pos.coords.latitude;
    let lon = pos.coords.longitude;

    let res = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json`);
    let data = await res.json();
    let a = data.address;

    alamatLengkap =
      (a.road || "") + "\n" +
      (a.suburb || a.village || "") + "\n" +
      (a.city || a.town || "") + "\n" +
      (a.state || "");
  });
}

// FORMAT TANGGAL
function formatTanggal() {
  const hari = ["Minggu","Senin","Selasa","Rabu","Kamis","Jumat","Sabtu"];
  const bulan = ["Januari","Februari","Maret","April","Mei","Juni","Juli","Agustus","September","Oktober","November","Desember"];

  let d = new Date();
  return `${hari[d.getDay()]}, ${d.getDate()} ${bulan[d.getMonth()]} ${d.getFullYear()}`;
}

// FOTO
function takePhoto() {
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  // MIRROR hasil kalau kamera depan
  if (currentFacing === "user") {
    ctx.translate(canvas.width, 0);
    ctx.scale(-1, 1);
  }

  ctx.drawImage(video, 0, 0);

  // reset transform biar text tidak kebalik
  ctx.setTransform(1, 0, 0, 1, 0, 0);

  ctx.fillStyle = "white";
  ctx.font = "18px Arial";

  let y = canvas.height - 100;

  ctx.fillText(formatTanggal(), 10, y);

  let lines = alamatLengkap.split("\n");
  lines.forEach((l, i) => {
    ctx.fillText(l, 10, y + 20 * (i + 1));
  });

  video.style.display = "none";
  document.getElementById("controlBar").style.display = "none";
  document.getElementById("preview").style.display = "block";
}

// SHARE
function shareTelegram() {
  canvas.toBlob(blob => {
    let a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "foto.png";
    a.click();

    window.location.href = "tg://msg";
  });
}

// RESET (BERSIH LANGSUNG)
function resetCamera() {
  canvas.width = 0;
  canvas.height = 0;

  video.style.display = "block";
  document.getElementById("controlBar").style.display = "flex";
  document.getElementById("preview").style.display = "none";
}

// PWA
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('service-worker.js');
}
</script>

</body>
</html>
