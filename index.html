<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kamera Lokasi</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: black;
  color: white;
  text-align: center;
}

video, canvas {
  width: 100%;
  max-width: 400px;
  border-radius: 12px;
  margin-top: 10px;
}

button {
  padding: 12px;
  margin: 5px;
  border: none;
  border-radius: 8px;
  font-size: 16px;
}

.controls {
  margin-top: 10px;
}
</style>
</head>

<body>

<h3>Kamera + Lokasi</h3>

<video id="video" autoplay playsinline></video>
<canvas id="canvas" style="display:none;"></canvas>

<div class="controls">
  <button onclick="switchCamera()">Switch</button>
  <button onclick="takePhoto()">📸 Ambil</button>
</div>

<img id="result" style="width:100%; max-width:400px; display:none; margin-top:10px;"/>

<div class="controls">
  <button onclick="downloadPhoto()">Download</button>
  <button onclick="shareTelegram()">Share Telegram</button>
</div>

<script>
let video = document.getElementById("video");
let canvas = document.getElementById("canvas");
let result = document.getElementById("result");

let currentFacing = "environment";
let stream;
let currentLocation = "Mengambil lokasi...";

// 🔹 Ambil kamera
async function startCamera() {
  if (stream) {
    stream.getTracks().forEach(track => track.stop());
  }

  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: currentFacing },
      audio: false
    });
    video.srcObject = stream;
  } catch (err) {
    alert("Gagal akses kamera: " + err);
  }
}

// 🔹 Switch kamera
function switchCamera() {
  currentFacing = currentFacing === "environment" ? "user" : "environment";
  startCamera();
}

// 🔹 Ambil lokasi
navigator.geolocation.getCurrentPosition(
  pos => {
    let lat = pos.coords.latitude;
    let lon = pos.coords.longitude;
    currentLocation = `Lat: ${lat.toFixed(5)}, Lon: ${lon.toFixed(5)}`;
  },
  err => {
    currentLocation = "Lokasi tidak diizinkan";
  }
);

// 🔹 Ambil foto
function takePhoto() {
  let ctx = canvas.getContext("2d");

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  ctx.drawImage(video, 0, 0);

  // Timestamp
  let time = new Date().toLocaleString();

  ctx.fillStyle = "rgba(0,0,0,0.5)";
  ctx.fillRect(0, canvas.height - 80, canvas.width, 80);

  ctx.fillStyle = "white";
  ctx.font = "16px Arial";
  ctx.fillText(time, 10, canvas.height - 50);
  ctx.fillText(currentLocation, 10, canvas.height - 20);

  let dataURL = canvas.toDataURL("image/png");

  result.src = dataURL;
  result.style.display = "block";
}

// 🔹 Download
function downloadPhoto() {
  let link = document.createElement("a");
  link.download = "foto.png";
  link.href = result.src;
  link.click();
}

// 🔹 Share Telegram
function shareTelegram() {
  if (!result.src) {
    alert("Ambil foto dulu!");
    return;
  }

  let url = encodeURIComponent(result.src);
  let text = encodeURIComponent("Foto dari Kamera Lokasi");

  window.open(`https://t.me/share/url?url=${url}&text=${text}`, "_blank");
}

// start
startCamera();
</script>

</body>
</html>
