<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kamera Lokasi</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#000000">

<style>
body {
  margin: 0;
  font-family: Arial;
  background: black;
  color: white;
  text-align: center;
}

video, canvas {
  width: 100%;
  max-width: 400px;
  border-radius: 12px;
  margin-top: 10px;
}

#shutter {
  width: 80px;
  height: 80px;
  border-radius: 50%;
  background: white;
  border: 6px solid #ccc;
  margin: 15px auto;
}

button {
  margin: 5px;
  padding: 10px;
  border-radius: 8px;
  border: none;
  background: orange;
  color: white;
  font-weight: bold;
  width: 90%;
}
</style>
</head>

<body>

<h3>Kamera Lokasi</h3>

<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>

<div id="controls">
  <button onclick="switchCamera()">Ganti Kamera</button>
  <div id="shutter" onclick="takePhoto()"></div>
  <button onclick="startCamera()">Aktifkan Kamera</button>
</div>

<div id="preview" style="display:none;">
  <button onclick="shareTelegram()">Share ke Telegram</button>
  <button onclick="resetCamera()">Reset</button>
</div>

<script>
let video = document.getElementById("video");
let canvas = document.getElementById("canvas");
let ctx = canvas.getContext("2d");

let currentFacing = "environment";
let stream;
let alamatLengkap = "";

async function startCamera() {
  if (stream) stream.getTracks().forEach(t => t.stop());

  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: currentFacing }
    });
    video.srcObject = stream;
  } catch {
    alert("Izin kamera ditolak");
  }

  ambilLokasi();
}

function switchCamera() {
  currentFacing = currentFacing === "environment" ? "user" : "environment";
  startCamera();
}

async function ambilLokasi() {
  navigator.geolocation.getCurrentPosition(async pos => {
    let lat = pos.coords.latitude;
    let lon = pos.coords.longitude;

    let res = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json`);
    let data = await res.json();
    let a = data.address;

    alamatLengkap =
      (a.road || "") + "\n" +
      (a.suburb || a.village || "") + "\n" +
      (a.city || a.town || "") + "\n" +
      (a.state || "");
  });
}

function formatTanggal() {
  const hari = ["Minggu","Senin","Selasa","Rabu","Kamis","Jumat","Sabtu"];
  const bulan = ["Januari","Februari","Maret","April","Mei","Juni","Juli","Agustus","September","Oktober","November","Desember"];

  let d = new Date();
  return `${hari[d.getDay()]}, ${d.getDate()} ${bulan[d.getMonth()]} ${d.getFullYear()}`;
}

function takePhoto() {
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  ctx.drawImage(video, 0, 0);

  ctx.fillStyle = "white";
  ctx.font = "18px Arial";

  let y = canvas.height - 100;

  ctx.fillText(formatTanggal(), 10, y);

  let lines = alamatLengkap.split("\n");
  lines.forEach((l, i) => {
    ctx.fillText(l, 10, y + 20 * (i + 1));
  });

  video.style.display = "none";
  document.getElementById("controls").style.display = "none";
  document.getElementById("preview").style.display = "block";
}

function shareTelegram() {
  canvas.toBlob(blob => {
    let a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "foto-lokasi.png";
    a.click();

    window.location.href = "tg://msg";
  });
}

function resetCamera() {
  video.style.display = "block";
  document.getElementById("controls").style.display = "block";
  document.getElementById("preview").style.display = "none";
}

// REGISTER SW
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('service-worker.js');
}
</script>

</body>
</html>
